<!doctype html>
<html>
    <head>
        <title>Petals — Phase 1 Visual Parity</title>
        <style>
            body {
                margin: 0;
                background: #222;
                display: flex;
                flex-direction: column;
                align-items: center;
                color: #fff;
                font-family: monospace;
            }
            .row {
                display: flex;
                gap: 10px;
                margin: 5px;
            }
            .col {
                text-align: center;
                font-size: 12px;
            }
            canvas {
                border: 1px solid #555;
            }
        </style>
    </head>
    <body>
        <h3>Petals — Phase 1 Visual Parity</h3>
        <div class="row">
            <div class="col">
                <b>Original SVG</b><br /><canvas
                    id="svgC"
                    width="706"
                    height="677"
                ></canvas>
            </div>
            <div class="col">
                <b>Three.js</b><br /><canvas
                    id="threeC"
                    width="706"
                    height="677"
                ></canvas>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
                }
            }
        </script>
        <script type="module">
            import * as THREE from "three";

            import { SVGLoader } from "three/addons/loaders/SVGLoader.js";

            var svgCtx = document.getElementById("svgC").getContext("2d");
            var threeCanvas = document.getElementById("threeC");
            var threeCtx = threeCanvas.getContext("2d");
            var renderer, scene, camera;

            // === Gradient resolution ===
            function resolveGradients(xml) {
                var SVG_NS = "http://www.w3.org/2000/svg";
                var XLINK_NS = "http://www.w3.org/1999/xlink";
                var grads = {};
                var defs = xml.querySelector("defs");
                if (!defs) {
                    var defsNS = xml.getElementsByTagNameNS(SVG_NS, "defs");
                    if (defsNS.length > 0) defs = defsNS[0];
                }
                if (!defs) return grads;
                var gradientEls = Array.from(
                    defs.querySelectorAll("linearGradient, radialGradient"),
                );
                if (gradientEls.length === 0) {
                    gradientEls = Array.from(
                        defs.getElementsByTagNameNS(SVG_NS, "linearGradient"),
                    );
                    gradientEls = gradientEls.concat(
                        Array.from(
                            defs.getElementsByTagNameNS(
                                SVG_NS,
                                "radialGradient",
                            ),
                        ),
                    );
                }
                gradientEls.forEach(function (g) {
                    var id = g.getAttribute("id");
                    if (!id) return;
                    var x1 = g.getAttribute("x1"),
                        y1 = g.getAttribute("y1"),
                        x2 = g.getAttribute("x2"),
                        y2 = g.getAttribute("y2");
                    var units = g.getAttribute("gradientUnits");
                    var tAttr = g.getAttribute("gradientTransform");
                    var stopEls = Array.from(
                        g.querySelectorAll ? g.querySelectorAll("stop") : [],
                    );
                    if (stopEls.length === 0)
                        stopEls = Array.from(
                            g.getElementsByTagNameNS(SVG_NS, "stop"),
                        );
                    var stops = [];
                    stopEls.forEach(function (s) {
                        var style = s.getAttribute("style") || "";
                        var off = s.getAttribute("offset");
                        if (off && off.indexOf("%") >= 0)
                            off = parseFloat(off) / 100;
                        else off = parseFloat(off);
                        if (isNaN(off)) off = 0;
                        var stopColor = s.getAttribute("stop-color");
                        if (!stopColor && style) {
                            var m = style.match(/stop-color:\s*([^;]+)/);
                            if (m) stopColor = m[1];
                        }
                        var stopOpacity = s.getAttribute("stop-opacity");
                        if (!stopOpacity && style) {
                            var m = style.match(/stop-opacity:\s*([^;]+)/);
                            if (m) stopOpacity = m[1];
                        }
                        stops.push({
                            offset: off,
                            color: stopColor || "#888",
                            opacity:
                                stopOpacity != null
                                    ? parseFloat(stopOpacity)
                                    : 1,
                        });
                    });
                    grads[id] = {
                        stops: stops,
                        x1: x1 != null ? parseFloat(x1) : NaN,
                        y1: y1 != null ? parseFloat(y1) : NaN,
                        x2: x2 != null ? parseFloat(x2) : NaN,
                        y2: y2 != null ? parseFloat(y2) : NaN,
                        units: units || "objectBoundingBox",
                        transform: tAttr,
                    };
                });
                gradientEls.forEach(function (g) {
                    var id = g.getAttribute("id");
                    if (!id) return;
                    var h =
                        g.getAttributeNS(XLINK_NS, "href") ||
                        g.getAttribute("href") ||
                        g.getAttribute("xlink:href");
                    if (h && h.startsWith("#")) h = h.slice(1);
                    if (!h) return;
                    var ref = grads[h];
                    if (!ref) return;
                    var curr = grads[id];
                    if (!curr.stops || curr.stops.length === 0)
                        curr.stops = ref.stops;
                    if (isNaN(curr.x1)) {
                        curr.x1 = ref.x1;
                        curr.y1 = ref.y1;
                        curr.x2 = ref.x2;
                        curr.y2 = ref.y2;
                    }
                    if (
                        curr.units === "objectBoundingBox" &&
                        !g.getAttribute("gradientUnits")
                    )
                        curr.units = ref.units || "objectBoundingBox";
                    if (
                        typeof curr.transform !== "string" &&
                        !curr.transform &&
                        ref.transform
                    )
                        curr.transform = ref.transform;
                });
                // Apply gradientTransform to userSpaceOnUse gradient coordinates
                Object.keys(grads).forEach(function (id) {
                    var g = grads[id];
                    if (!g.transform) return;
                    if (g.units !== "userSpaceOnUse") return;
                    var tf = parseTransform(g.transform);
                    if (tf.a === 1 && tf.b === 0 && tf.c === 0 && tf.d === 1)
                        return;
                    // Transform (x1,y1) and (x2,y2) by the matrix
                    var x1n = tf.a * g.x1 + tf.c * g.y1 + tf.e;
                    var y1n = tf.b * g.x1 + tf.d * g.y1 + tf.f;
                    var x2n = tf.a * g.x2 + tf.c * g.y2 + tf.e;
                    var y2n = tf.b * g.x2 + tf.d * g.y2 + tf.f;
                    g.x1 = x1n;
                    g.y1 = y1n;
                    g.x2 = x2n;
                    g.y2 = y2n;
                    g.transform = null; // clear so we don't apply twice
                });
                return grads;
            }

            function fillFromGrad(fillUrl, grads) {
                if (!fillUrl || typeof fillUrl !== "string")
                    return { type: "solid", color: "#ff69b4" };
                // Handle quoted URLs: url("#id") or url('#id')
                var clean = fillUrl.replace(/["']/g, "");
                if (!clean.startsWith("url(#"))
                    return { type: "solid", color: fillUrl };
                var id = clean.slice(5, -1);
                var g = grads[id];
                if (!g) return { type: "solid", color: "#ff69b4" };
                return { type: "gradient", grad: g };
            }

            function parseTransform(str) {
                var m = { a: 1, b: 0, c: 0, d: 1, e: 0, f: 0 };
                if (!str) return m;
                var r =
                    /matrix\(\s*([\d.\-eE]+)\s*[,\s]\s*([\d.\-eE]+)\s*[,\s]\s*([\d.\-eE]+)\s*[,\s]\s*([\d.\-eE]+)\s*[,\s]\s*([\d.\-eE]+)\s*[,\s]\s*([\d.\-eE]+)\s*\)/;
                var match = str.match(r);
                if (match) {
                    m.a = parseFloat(match[1]);
                    m.b = parseFloat(match[2]);
                    m.c = parseFloat(match[3]);
                    m.d = parseFloat(match[4]);
                    m.e = parseFloat(match[5]);
                    m.f = parseFloat(match[6]);
                    return m;
                }
                var t =
                    /translate\(\s*([\d.\-eE]+)\s*,\s*([\d.\-eE]+)\s*\)/.exec(
                        str,
                    );
                if (t) {
                    m.e = parseFloat(t[1]);
                    m.f = parseFloat(t[2]);
                }
                return m;
            }

            function multiplyTransforms(t1, t2) {
                // Returns t1 × t2 (apply t2 first, then t1)
                return {
                    a: t1.a * t2.a + t1.c * t2.b,
                    b: t1.b * t2.a + t1.d * t2.b,
                    c: t1.a * t2.c + t1.c * t2.d,
                    d: t1.b * t2.c + t1.d * t2.d,
                    e: t1.a * t2.e + t1.c * t2.f + t1.e,
                    f: t1.b * t2.e + t1.d * t2.f + t1.f,
                };
            }

            function applyTransformToPoint(tf, x, y) {
                return {
                    x: tf.a * x + tf.c * y + tf.e,
                    y: tf.b * x + tf.d * y + tf.f,
                };
            }

            function hexToRgb(h) {
                var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(h);
                return r
                    ? {
                          r: parseInt(r[1], 16),
                          g: parseInt(r[2], 16),
                          b: parseInt(r[3], 16),
                      }
                    : null;
            }

            function getBBoxFromVertices(geom) {
                var pos = geom.attributes.position.array;
                var minX = Infinity,
                    minY = Infinity,
                    maxX = -Infinity,
                    maxY = -Infinity;
                for (var i = 0; i < pos.length; i += 3) {
                    if (pos[i] < minX) minX = pos[i];
                    if (pos[i] > maxX) maxX = pos[i];
                    if (pos[i + 1] < minY) minY = pos[i + 1];
                    if (pos[i + 1] > maxY) maxY = pos[i + 1];
                }
                return {
                    x: minX,
                    y: minY,
                    w: maxX - minX || 1,
                    h: maxY - minY || 1,
                };
            }

            function makeGradientTexture(grad, bbox, cumulativeTransform) {
                var c = document.createElement("canvas");
                c.width = 128;
                c.height = 128;
                var ctx = c.getContext("2d");
                if (!grad || !grad.stops || grad.stops.length < 1) {
                    ctx.fillStyle = "#ff69b4";
                    ctx.fillRect(0, 0, 128, 128);
                    return new THREE.CanvasTexture(c);
                }

                var x1 = grad.x1,
                    y1 = grad.y1,
                    x2 = grad.x2,
                    y2 = grad.y2;

                // Default to horizontal gradient
                if (isNaN(x1) || isNaN(x2) || isNaN(y1) || isNaN(y2)) {
                    x1 = 0;
                    y1 = 0;
                    x2 = 1;
                    y2 = 0;
                }

                // gradient coords are in viewBox space after resolveGradients applied gradientTransform
                // SVGLoader bakes group transforms into geometry, so geometry is also in viewBox space
                // No additional transform needed

                var w = c.width,
                    h = c.height;
                var stops = grad.stops;
                var isUserSpace = grad.units === "userSpaceOnUse";

                // Pre-compute gradient line
                var gdx = x2 - x1,
                    gdy = y2 - y1;
                var gradLen2 = gdx * gdx + gdy * gdy;
                if (gradLen2 < 1e-10) {
                    gdx = 1;
                    gdy = 0;
                    gradLen2 = 1;
                }

                for (var py = 0; py < h; py++) {
                    for (var px = 0; px < w; px++) {
                        var u = px / w,
                            v = py / h;
                        var pos;
                        if (isUserSpace) {
                            // Project absolute world position onto gradient line
                            var wx = bbox.x + u * bbox.w;
                            var wy = bbox.y + v * bbox.h;
                            var tdx = wx - x1,
                                tdy = wy - y1;
                            var t = (tdx * gdx + tdy * gdy) / gradLen2;
                            pos = Math.max(0, Math.min(1, t));
                        } else {
                            // objectBoundingBox: project bbox-relative (u,v) onto gradient direction
                            var dx = gdx,
                                dy = gdy;
                            var dirLen = Math.sqrt(gradLen2);
                            var ux = dx / dirLen,
                                uy = dy / dirLen;
                            // Project bbox corners onto gradient direction
                            var corners = [
                                ux * 0 + uy * 0,
                                ux * 1 + uy * 0,
                                ux * 0 + uy * 1,
                                ux * 1 + uy * 1,
                            ];
                            var gMin = Math.min.apply(null, corners);
                            var gMax = Math.max.apply(null, corners);
                            var gRange = gMax - gMin || 1;
                            pos = (u * ux + v * uy - gMin) / gRange;
                            pos = Math.max(0, Math.min(1, pos));
                        }

                        var cr = 255,
                            cg = 64,
                            cb = 180,
                            ca = 255;
                        for (var k = 0; k < stops.length - 1; k++) {
                            if (
                                pos >= stops[k].offset &&
                                pos <= stops[k + 1].offset
                            ) {
                                var lo = stops[k].offset,
                                    hi = stops[k + 1].offset;
                                var f = hi === lo ? 0 : (pos - lo) / (hi - lo);
                                var ca_rgb = hexToRgb(stops[k].color);
                                var cb_rgb = hexToRgb(stops[k + 1].color);
                                var ao = stops[k].opacity,
                                    bo = stops[k + 1].opacity;
                                if (!ca_rgb || !cb_rgb) {
                                    cr = 255;
                                    cg = 64;
                                    cb = 180;
                                    ca = 255;
                                } else {
                                    cr = Math.round(
                                        ca_rgb.r + (cb_rgb.r - ca_rgb.r) * f,
                                    );
                                    cg = Math.round(
                                        ca_rgb.g + (cb_rgb.g - ca_rgb.g) * f,
                                    );
                                    cb = Math.round(
                                        ca_rgb.b + (cb_rgb.b - ca_rgb.b) * f,
                                    );
                                    ca = Math.round((ao + (bo - ao) * f) * 255);
                                }
                                break;
                            }
                        }
                        ctx.fillStyle =
                            "rgba(" +
                            cr +
                            "," +
                            cg +
                            "," +
                            cb +
                            "," +
                            (ca / 255).toFixed(3) +
                            ")";
                        ctx.fillRect(px, py, 1, 1);
                    }
                }
                var tex = new THREE.CanvasTexture(c);
                tex.colorSpace = THREE.SRGBColorSpace;
                tex.flipY = false;
                tex.needsUpdate = true;
                return tex;
            }

            // === Main ===
            async function init() {
                // Load Petal2.svg — locked, unchanged
                var resp2 = await fetch("Petals/Petal2.svg?" + Date.now());
                var svgText2 = await resp2.text();

                // Load Petal1.svg for gradients + Petal1 paths + native reference
                var resp1 = await fetch("Petals/Petal1.svg?" + Date.now());
                var svgText1 = await resp1.text();
                var xml1 = new DOMParser().parseFromString(
                    svgText1,
                    "image/svg+xml",
                );
                var gradients = resolveGradients(xml1);

                // Render Petal1.svg as native reference (validating Petal1)
                var refImg = new Image();
                refImg.onload = function () {
                    svgCtx.clearRect(0, 0, 706, 677);
                    svgCtx.drawImage(refImg, 0, 0, 706, 677);
                    // Petal2 first (behind), Petal1 second (on top)
                    initThree([svgText2, svgText1], gradients);
                };
                refImg.onerror = function () {
                    initThree([svgText2, svgText1], gradients);
                };
                refImg.src = "Petals/Petal1.svg?" + Date.now();
            }

            function initThree(svgTexts, gradients) {
                renderer = new THREE.WebGLRenderer({
                    antialias: false,
                    alpha: true,
                    preserveDrawingBuffer: true,
                });
                renderer.setClearColor(0, 0, 0, 0);
                renderer.setSize(706, 677);

                camera = new THREE.OrthographicCamera(
                    0,
                    706,
                    0,
                    677,
                    -1000,
                    1000,
                );
                camera.position.set(0, 0, 500);
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x222222);

                var flowerGroup = new THREE.Group();

                var groupMap = {
                    Petals: [],
                    Stigma: [],
                    Stamens: [],
                    Anthers: [],
                };
                var groupNodes = {};
                var groupNames = { Petals: true };

                var loader = new SVGLoader();
                var globalRenderOrder = 0;

                // Load SVGs sequentially: Petal2 then Petal1
                function loadNext(index) {
                    if (index >= svgTexts.length) {
                        buildScene();
                        return;
                    }
                    var uri =
                        "data:image/svg+xml;base64," +
                        btoa(unescape(encodeURIComponent(svgTexts[index])));
                    loader.load(
                        uri,
                        function (data) {
                            var paths = data.paths;

                            paths.forEach(function (path) {
                                var node = path.userData.node;
                                var parent = node.parentNode;
                                while (parent && parent.nodeName !== "g")
                                    parent = parent.parentNode;
                                var groupId = parent
                                    ? parent.getAttribute("id")
                                    : null;
                                if (!groupId || !groupNames[groupId]) return;
                                if (!groupNodes[groupId])
                                    groupNodes[groupId] = parent;

                                var style = path.userData.style;
                                var fillVal = style.fill;
                                var elemOpacity = parseFloat(style.opacity);
                                if (isNaN(elemOpacity)) elemOpacity = 1;
                                var fillOpacity = parseFloat(style.fillOpacity);
                                if (isNaN(fillOpacity)) fillOpacity = 1;
                                var opacity = elemOpacity * fillOpacity;
                                var fillInfo = fillFromGrad(fillVal, gradients);
                                var shapes = path.toShapes(true);
                                if (shapes.length === 0) return;

                                shapes.forEach(function (shape) {
                                    var geom = new THREE.ShapeGeometry(shape);
                                    if (!geom) return;

                                    var _bb = getBBoxFromVertices(geom);
                                    var _pos = geom.getAttribute("position");
                                    var _uvs = [];
                                    for (var _vi = 0; _vi < _pos.count; _vi++) {
                                        _uvs.push(
                                            (_pos.getX(_vi) - _bb.x) / _bb.w,
                                            (_pos.getY(_vi) - _bb.y) / _bb.h,
                                        );
                                    }
                                    geom.setAttribute(
                                        "uv",
                                        new THREE.Float32BufferAttribute(
                                            _uvs,
                                            2,
                                        ),
                                    );

                                    var fillMatOpts = {
                                        side: THREE.DoubleSide,
                                        transparent: opacity < 1,
                                        opacity: opacity,
                                    };

                                    if (fillInfo.type === "gradient") {
                                        var bbox = _bb;
                                        var pathTF = parseTransform(
                                            node.getAttribute("transform"),
                                        );
                                        var groupTF = parseTransform(
                                            parent.getAttribute("transform"),
                                        );
                                        var cumulativeTF = multiplyTransforms(
                                            groupTF,
                                            pathTF,
                                        );
                                        try {
                                            var tex = makeGradientTexture(
                                                fillInfo.grad,
                                                bbox,
                                                cumulativeTF,
                                            );
                                            fillMatOpts.map = tex;
                                            fillMatOpts.color = new THREE.Color(
                                                0xffffff,
                                            );
                                            var hasTrans =
                                                fillInfo.grad.stops.some(
                                                    function (s) {
                                                        return s.opacity < 1;
                                                    },
                                                );
                                            fillMatOpts.transparent = hasTrans;
                                        } catch (e) {
                                            fillMatOpts.color = new THREE.Color(
                                                "#ff69b4",
                                            );
                                        }
                                    } else {
                                        fillMatOpts.color = new THREE.Color(
                                            fillInfo.color,
                                        );
                                    }
                                    var fillMat = new THREE.MeshBasicMaterial(
                                        fillMatOpts,
                                    );

                                    var mesh = new THREE.Mesh(geom, fillMat);
                                    mesh.renderOrder = globalRenderOrder++;
                                    groupMap[groupId].push(mesh);
                                });
                            });

                            loadNext(index + 1);
                        },
                        undefined,
                        function () {
                            loadNext(index + 1);
                        },
                    );
                }

                function buildScene() {
                    Object.keys(groupMap).forEach(function (name) {
                        var g = new THREE.Group();
                        g.name = name;
                        var gn = groupNodes[name];
                        var groupOpacity = 1;
                        if (gn) {
                            var gt = parseTransform(
                                gn.getAttribute("transform"),
                            );
                            if (name !== "Petals") {
                                g.position.set(gt.e, gt.f, 0);
                            }
                            var opAttr = gn.getAttribute("opacity");
                            if (opAttr) {
                                groupOpacity = parseFloat(opAttr);
                                if (isNaN(groupOpacity)) groupOpacity = 1;
                            }
                        }
                        groupMap[name].forEach(function (m) {
                            if (m.material) {
                                m.material.opacity *= groupOpacity;
                                if (
                                    m.material.opacity < 1 ||
                                    (m.material.map && m.material.transparent)
                                )
                                    m.material.transparent = true;
                            }
                            g.add(m);
                        });
                        flowerGroup.add(g);
                    });

                    scene.add(flowerGroup);

                    renderer.render(scene, camera);
                    threeCtx.drawImage(renderer.domElement, 0, 0, 706, 677);
                }

                loadNext(0);
            }

            init();
        </script>
    </body>
</html>
